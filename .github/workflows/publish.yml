name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore NugLabs.csproj

      - name: Build
        run: dotnet build NugLabs.csproj -c Release --no-restore

      - name: Test
        run: dotnet test NugLabs.Tests/NugLabs.Tests.csproj -c Release --no-restore

      - name: Pack
        run: dotnet pack NugLabs.csproj -c Release --no-build -o ./artifacts

      - name: Push package
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
